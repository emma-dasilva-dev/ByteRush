<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Challenges Mode</title>

<style>
body {
  background: #020617;
  color: #38bdf8;
  font-family: monospace;
  text-align: center;
  padding: 40px;
}

h1 {
  text-shadow: 0 0 10px #38bdf8;
}

.challenge-box {
  border: 2px solid #38bdf8;
  padding: 20px;
  max-width: 600px;
  margin: 20px auto;
}

textarea {
  width: 100%;
  height: 120px;
  background: #020617;
  color: #38bdf8;
  border: 2px solid #38bdf8;
  padding: 10px;
  font-family: monospace;
}

button {
  margin-top: 10px;
  padding: 10px 20px;
  border: 2px solid #38bdf8;
  background: transparent;
  color: #38bdf8;
  cursor: pointer;
}

.timer {
  font-size: 20px;
  margin: 10px;
}

.streak {
  color: #facc15;
}

</style>
</head>

<body>

<h1>⚡ CHALLENGE MODE</h1>
<p>5 Missions. 5 Seconds Each. No Mercy.</p>

<div class="timer">⏱ <span id="time">5</span>s</div>
<div class="streak">🔥 Streak: <span id="streak">0</span></div>

<div class="challenge-box">
  <p id="instruction"></p>
  <textarea id="code"></textarea><br>
  <button onclick="submitAnswer()">SUBMIT</button>
</div>

<p id="result"></p>

<script>

let challenges = [
  { q: "Type: h1 { color: blue; }", a: "h1{color:blue;}" },
  { q: "Type: body { background-color: black; }", a: "body{background-color:black;}" },
  { q: "Type: h1 { font-size: 40px; }", a: "h1{font-size:40px;}" },
  { q: "Type: .card { padding: 20px; }", a: ".card{padding:20px;}" },
  { q: "Type: .card { text-align: center; }", a: ".card{text-align:center;}" }
];

let current = 0;
let time = 5;
let timer;
let streak = 0;

function normalize(text) {
  return text.replace(/\s+/g, "").toLowerCase();
}

function loadChallenge() {
  if (current >= challenges.length) {
    winGame();
    return;
  }

  document.getElementById("instruction").innerText = challenges[current].q;
  document.getElementById("code").value = "";
  document.getElementById("result").innerText = "";

  time = 5;
  document.getElementById("time").innerText = time;

  clearInterval(timer);
  timer = setInterval(() => {
    time--;
    document.getElementById("time").innerText = time;

    if (time <= 0) {
      failGame();
    }
  }, 1000);
}

function submitAnswer() {
  const user = normalize(document.getElementById("code").value);
  const correct = challenges[current].a;

  if (user === correct) {
    clearInterval(timer);

    streak++;
    document.getElementById("streak").innerText = streak;

    current++;
    loadChallenge();
  } else {
    failGame();
  }
}

function failGame() {
  clearInterval(timer);

  streak = 0;
  document.getElementById("streak").innerText = 0;

  document.getElementById("result").innerText = "❌ Failed. Restarting...";

  setTimeout(() => {
    current = 0;
    loadChallenge();
  }, 1500);
}

function winGame() {
  let xp = parseInt(localStorage.getItem("xp")) || 0;
  xp += 100;
  localStorage.setItem("xp", xp);

  document.getElementById("result").innerText = "🏆 YOU WON! +100 XP";

  setTimeout(() => {
    window.location.href = "index.html";
  }, 3000);
}

loadChallenge();

</script>

</body>
</html>
