<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CSS Circuit</title>

<style>
body {
  background: #020617;
  color: #38bdf8;
  font-family: monospace;
  text-align: center;
  padding: 40px;
  margin: 0;
}

h1, h2, h3 {
  color: #38bdf8;
  text-shadow: 0 0 10px #38bdf8;
}

.bytebot {
  max-width: 850px;
  margin: 20px auto;
  border: 2px solid #38bdf8;
  background: #020617;
  padding: 18px;
  text-align: left;
  box-shadow: 0 0 18px rgba(56,189,248,0.35);
}

.stats {
  margin: 15px auto;
  color: #bae6fd;
  font-weight: bold;
}

.arena-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 26px;
  width: 85%;
  max-width: 950px;
  margin: 30px auto;
}

textarea, iframe {
  width: 100%;
  height: 250px;
  border: 2px solid #38bdf8;
  box-sizing: border-box;
}

textarea {
  background: #020617;
  color: #38bdf8;
  padding: 15px;
  font-family: monospace;
  font-size: 16px;
  outline: none;
  resize: none;
  box-shadow: 0 0 12px rgba(56,189,248,0.25);
}

iframe {
  background: white;
  box-shadow: 0 0 12px rgba(56,189,248,0.25);
}

button {
  background: transparent;
  color: #38bdf8;
  border: 2px solid #38bdf8;
  padding: 10px 18px;
  margin: 10px 5px;
  cursor: pointer;
  font-family: monospace;
}

button:hover {
  background: #38bdf8;
  color: black;
  box-shadow: 0 0 15px #38bdf8;
}

#result {
  margin-top: 15px;
  font-weight: bold;
}

.success-flash {
  animation: successFlash 0.5s ease-in-out;
}

@keyframes successFlash {
  0% { background-color: #020617; }
  50% { background-color: rgba(56,189,248,0.25); }
  100% { background-color: #020617; }
}

.preview-glow {
  animation: previewGlow 0.7s ease-in-out;
}

@keyframes previewGlow {
  0% { box-shadow: 0 0 12px rgba(56,189,248,0.25); }
  50% { box-shadow: 0 0 35px #38bdf8; }
  100% { box-shadow: 0 0 12px rgba(56,189,248,0.25); }
}

.error-shake {
  animation: shake 0.3s ease-in-out;
}

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  50% { transform: translateX(6px); }
  75% { transform: translateX(-6px); }
  100% { transform: translateX(0); }
}

.xp-pop {
  position: fixed;
  left: 50%;
  top: 58%;
  color: #38bdf8;
  font-size: 22px;
  font-weight: bold;
  pointer-events: none;
  animation: xpFloat 1s ease-out forwards;
  z-index: 9999;
}

@keyframes xpFloat {
  0% {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  100% {
    opacity: 0;
    transform: translateX(-50%) translateY(-45px) scale(1.3);
  }
}

@media (max-width: 800px) {
  .arena-layout {
    grid-template-columns: 1fr;
    width: 92%;
  }
}
</style>
</head>

<body>

<h1>CSS CIRCUIT</h1>
<h2 id="mission-title"></h2>

<div class="stats">
  ⏱ TIME: <span id="timer">0</span>s |
  SPEED BONUS: <span id="bonus">Available</span>
</div>

<div class="bytebot">
  🤖 <span id="instruction"></span>
</div>

<div class="arena-layout">

  <div>
    <h3>CSS Editor</h3>
    <textarea id="code"></textarea>
    <br>
    <button onclick="checkCode()">RUN</button>
    <button onclick="window.location.href='css-map.html'">← BACK TO MAP</button>
  </div>

  <div>
    <h3>Live Preview</h3>
    <iframe id="preview"></iframe>
  </div>

</div>

<p id="result"></p>

<script>
let level = parseInt(localStorage.getItem("css-level")) || 1;
let seconds = 0;
let timerInterval;

const missions = {
  1: {
    title: "Mission 1: Colors",
    starter: "h1 {\n  color: write color here;\n}",
    instruction: 'Replace "write color here" with "blue".',
    check: code => code.includes("h1{color:blue;}")
  },
  2: {
    title: "Mission 2: Backgrounds",
    starter: "body {\n  background-color: write background here;\n}",
    instruction: 'Replace "write background here" with "black".',
    check: code => code.includes("body{background-color:black;}")
  },
  3: {
    title: "Mission 3: Font Size",
    starter: "h1 {\n  font-size: write size here;\n}",
    instruction: 'Replace "write size here" with "40px".',
    check: code => code.includes("h1{font-size:40px;}")
  },
  4: {
    title: "Mission 4: Borders",
    starter: ".card {\n  border: write border here;\n}",
    instruction: 'Replace "write border here" with "2px solid blue".',
    check: code => code.includes(".card{border:2pxsolidblue;}")
  },
  5: {
    title: "Mission 5: Alignment",
    starter: ".card {\n  text-align: write alignment here;\n}",
    instruction: 'Replace "write alignment here" with "center".',
    check: code => code.includes(".card{text-align:center;}")
  },
  6: {
    title: "Mission 6: Spacing",
    starter: ".card {\n  padding: write spacing here;\n}",
    instruction: 'Replace "write spacing here" with "20px".',
    check: code => code.includes(".card{padding:20px;}")
  },
  7: {
    title: "BOSS MODE: Styled Profile Card",
    starter: ".card {\n  color: white;\n  background-color: black;\n  font-size: 20px;\n  border: 2px solid blue;\n  text-align: center;\n  padding: 20px;\n}",
    instruction: "Use color, background-color, font-size, border, text-align, and padding.",
    boss: true,
    check: code =>
      code.includes("color:") &&
      code.includes("background-color:") &&
      code.includes("font-size:") &&
      code.includes("border:") &&
      code.includes("text-align:") &&
      code.includes("padding:")
  }
};

function loadMission() {
  const mission = missions[level];

  if (!mission) {
    document.getElementById("mission-title").innerText = "CSS CIRCUIT COMPLETE!";
    document.getElementById("instruction").innerText = "JS Core is ready.";
    document.getElementById("code").value = "";
    updatePreview();
    return;
  }

  document.getElementById("mission-title").innerText = mission.title;
  document.getElementById("instruction").innerText = mission.instruction;
  document.getElementById("code").value = mission.starter;
  document.getElementById("result").innerText = "";

  seconds = 0;
  document.getElementById("timer").innerText = seconds;
  document.getElementById("bonus").innerText = "Available";

  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    seconds++;
    document.getElementById("timer").innerText = seconds;

    if (seconds > 15) {
      document.getElementById("bonus").innerText = "Expired";
    }
  }, 1000);

  updatePreview();
}

function normalize(code) {
  return code.replace(/\s+/g, "").toLowerCase();
}

function checkCode() {
  const rawCode = document.getElementById("code").value;
  const code = normalize(rawCode);
  const mission = missions[level];

  updatePreview();

  if (!mission) return;

  if (mission.check(code)) {
    clearInterval(timerInterval);

    let xpGain = mission.boss ? 50 : 10;
    let speedBonus = 0;

    if (seconds <= 15) {
      speedBonus = 5;
      xpGain += speedBonus;
    }

    success(xpGain, speedBonus);
  } else {
    errorEffect();
  }
}

function success(xpGain, speedBonus) {
  const result = document.getElementById("result");
  const preview = document.getElementById("preview");

  result.innerText = speedBonus > 0
    ? "✅ SUCCESS! +" + xpGain + " XP — SPEED BONUS!"
    : "✅ SUCCESS! +" + xpGain + " XP";

  document.body.classList.add("success-flash");
  preview.classList.add("preview-glow");

  setTimeout(() => {
    document.body.classList.remove("success-flash");
    preview.classList.remove("preview-glow");
  }, 700);

  showXPPop(xpGain);
  addXP(xpGain);

  level++;
  localStorage.setItem("css-level", level);

  setTimeout(() => {
    window.location.href = "css-map.html";
  }, level > 7 ? 2500 : 1300);
}

function errorEffect() {
  const editor = document.getElementById("code");
  const result = document.getElementById("result");

  result.innerText = "❌ Try again. Check the CSS value carefully.";

  editor.classList.add("error-shake");

  setTimeout(() => {
    editor.classList.remove("error-shake");
  }, 300);
}

function addXP(points) {
  let xp = parseInt(localStorage.getItem("xp")) || 0;
  xp += points;
  localStorage.setItem("xp", xp);
}

function showXPPop(amount) {
  const xp = document.createElement("div");
  xp.className = "xp-pop";
  xp.innerText = "+" + amount + " XP";
  document.body.appendChild(xp);

  setTimeout(() => {
    xp.remove();
  }, 1000);
}

function updatePreview() {
  const css = document.getElementById("code").value;

  const preview = `
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }

      .card {
        width: 220px;
        margin: 20px auto;
        background: #ddd;
        padding: 10px;
      }

      ${css}
    </style>

    <h1>Hello CSS</h1>

    <div class="card">
      <h2>Profile Card</h2>
      <p>Style me!</p>
    </div>
  `;

  document.getElementById("preview").srcdoc = preview;
}

document.getElementById("code").addEventListener("input", updatePreview);

loadMission();
</script>

</body>
</html>
