<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Projects Lab | ByteRush</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

:root {
  --green: #39FF5A;
  --red: #FF3B3B;
  --bg: #03080F;
  --panel: #050B12;
  --panel2: #07111D;
  --dark: #02060B;
  --text: #E8FFF0;
  --muted: #A8C9B1;
  --line: rgba(57,255,90,0.35);
  --yellow: #FACC15;
  --orange: #FF9F3B;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  background: var(--bg);
  color: var(--text);
  font-family: Consolas, Monaco, monospace;
  padding: 14px;
  min-height: 100vh;
  font-size: 13px;
  overflow-x: hidden;
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(57,255,90,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(57,255,90,0.025) 1px, transparent 1px);
  background-size: 38px 38px;
  pointer-events: none;
  z-index: -1;
}

h1, h2, h3, button, .project-title, .badge-label, .terminal-label {
  font-family: 'Press Start 2P', monospace;
}

.lab {
  max-width: 1280px;
  margin: 0 auto;
}

.topbar {
  border: 2px solid var(--line);
  background: var(--panel);
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}

h1 {
  color: var(--green);
  font-size: 17px;
  margin: 0 0 6px;
}

.desc {
  color: var(--muted);
  margin: 0;
  font-size: 13px;
}

button {
  background: var(--green);
  color: var(--bg);
  border: none;
  padding: 10px 12px;
  cursor: pointer;
  font-size: 7px;
}

button.secondary {
  background: transparent;
  color: var(--green);
  border: 1px solid var(--green);
}

button.danger {
  background: transparent;
  color: var(--red);
  border: 1px solid var(--red);
}

button:hover {
  opacity: 0.85;
}

.projects-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

.project-card {
  border: 1px solid var(--line);
  background: linear-gradient(180deg, #07111D, #02060B);
  padding: 12px;
  cursor: pointer;
  min-height: 245px;
  position: relative;
  transition: 0.15s ease;
}

.project-card:hover {
  border-color: var(--green);
  transform: translateY(-2px);
}

.project-top {
  display: flex;
  justify-content: space-between;
  gap: 8px;
  align-items: flex-start;
  margin-bottom: 8px;
}

.project-icon {
  color: var(--green);
  font-size: 17px;
}

.project-title {
  color: var(--green);
  font-size: 8px;
  line-height: 1.7;
}

.project-card p {
  color: var(--muted);
  font-size: 12px;
  margin: 7px 0;
  line-height: 1.45;
}

.project-story {
  color: var(--text);
  font-size: 12px;
  min-height: 42px;
}

.badge-label {
  display: inline-block;
  border: 1px solid var(--line);
  color: var(--green);
  padding: 5px 7px;
  font-size: 6px;
  margin-top: 5px;
}

.easy { color: var(--green); border-color: var(--green); }
.medium { color: var(--yellow); border-color: var(--yellow); }
.hard { color: var(--orange); border-color: var(--orange); }
.boss { color: var(--red); border-color: var(--red); }

.project-preview {
  border: 1px solid var(--line);
  background: var(--dark);
  height: 58px;
  margin: 10px 0;
  padding: 8px;
  overflow: hidden;
}

.fake-avatar {
  width: 18px;
  height: 18px;
  border: 1px solid var(--green);
  margin: 0 auto 5px;
}

.fake-line {
  height: 5px;
  background: rgba(57,255,90,0.45);
  margin: 4px auto;
}

.fake-line.short { width: 45%; }
.fake-line.mid { width: 70%; }
.fake-line.long { width: 90%; }

.fake-button {
  border: 1px solid var(--green);
  width: 52px;
  height: 13px;
  margin: 6px auto 0;
}

.fake-counter {
  font-size: 22px;
  color: var(--green);
  text-align: center;
}

.fake-quiz-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 5px;
  margin-top: 8px;
}

.fake-answer {
  border: 1px solid var(--line);
  height: 14px;
}

.fake-portfolio {
  display: grid;
  grid-template-columns: 0.7fr 1.3fr;
  gap: 7px;
  height: 100%;
}

.fake-side,
.fake-main {
  border: 1px solid var(--line);
}

.project-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 10px;
  color: var(--text);
  font-size: 12px;
}

.status-bar {
  margin-top: 8px;
  height: 7px;
  border: 1px solid var(--line);
  background: #02060B;
  overflow: hidden;
}

.status-fill {
  height: 100%;
  background: var(--green);
  width: 0%;
}

.builder {
  display: none;
}

.builder-header {
  border: 2px solid var(--line);
  background: var(--panel);
  padding: 12px;
  margin-bottom: 10px;
  display: flex;
  justify-content: space-between;
  gap: 12px;
  align-items: center;
}

.builder-header h2 {
  color: var(--green);
  font-size: 12px;
  margin: 0;
}

.mode-buttons {
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
}

.info-grid {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr;
  gap: 10px;
  margin-bottom: 10px;
}

.bytebot,
.checklist,
.panel,
.result {
  border: 1px solid var(--line);
  background: var(--panel);
  padding: 11px;
}

.bytebot,
.checklist {
  background: var(--panel2);
}

.bytebot h3,
.checklist h3,
.panel h3 {
  color: var(--green);
  font-size: 8px;
  margin: 0 0 7px;
}

.bytebot p {
  color: var(--muted);
  margin: 0;
  font-size: 12px;
  line-height: 1.5;
}

.check-item {
  color: var(--muted);
  font-size: 12px;
  margin: 4px 0;
}

.check-item.done {
  color: var(--green);
}

.work-layout {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

textarea {
  width: 100%;
  height: 260px;
  background: var(--dark);
  color: var(--green);
  border: 1px solid var(--line);
  padding: 12px;
  font-size: 13px;
  resize: vertical;
  outline: none;
  font-family: Consolas, Monaco, monospace;
}

textarea:focus {
  border-color: var(--green);
}

.browser-frame {
  border: 1px solid var(--line);
  background: var(--dark);
}

.browser-top {
  height: 28px;
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 0 9px;
}

.dot {
  width: 7px;
  height: 7px;
  border: 1px solid var(--green);
}

.browser-title {
  color: var(--muted);
  font-size: 11px;
  margin-left: 6px;
}

iframe {
  width: 100%;
  height: 232px;
  background: white;
  border: none;
  display: block;
}

.result {
  margin-top: 10px;
  background: var(--panel2);
  color: var(--muted);
  font-size: 13px;
}

.success { color: var(--green); }
.error { color: var(--red); }
.warning { color: var(--yellow); }

#completion-overlay {
  position: fixed;
  inset: 0;
  background: rgba(3, 8, 15, 0.96);
  display: none;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  z-index: 9999;
  text-align: center;
}

.overlay-text {
  color: var(--green);
  font-family: 'Press Start 2P', monospace;
  font-size: 20px;
  margin-bottom: 14px;
}

.overlay-small {
  color: var(--yellow);
  font-size: 14px;
  margin-bottom: 8px;
}

.score-box {
  border: 1px solid var(--line);
  background: var(--panel2);
  padding: 12px;
  color: var(--text);
  margin-top: 12px;
  min-width: 280px;
}

@media (max-width: 1000px) {
  .projects-grid {
    grid-template-columns: repeat(2, 1fr);
  }

  .work-layout,
  .info-grid {
    grid-template-columns: 1fr;
  }

  .topbar,
  .builder-header {
    flex-direction: column;
    align-items: flex-start;
  }
}
</style>
</head>

<body>

<main class="lab">

  <section class="topbar">
    <div>
      <h1>Projects Lab</h1>
      <p class="desc">Build real mini-projects inside the ByteRush workshop.</p>
    </div>

    <button class="secondary" onclick="window.location.href='dashboard.html'">Go Back to Dashboard</button>
  </section>

  <section id="project-menu" class="projects-grid"></section>

  <section id="builder" class="builder">

    <div class="builder-header">
      <h2 id="project-title">Project</h2>

      <div class="mode-buttons">
        <button class="secondary" onclick="backToProjects()">Back to Projects</button>
        <button class="danger" onclick="window.location.href='dashboard.html'">Dashboard</button>
      </div>
    </div>

    <div class="info-grid">
      <div class="bytebot">
        <h3>BYTEBOT</h3>
        <p id="instruction"></p>
      </div>

      <div class="checklist">
        <h3>CHECKLIST</h3>
        <div id="checklist"></div>
      </div>
    </div>

    <div class="work-layout">
      <div class="panel">
        <h3>CODE EDITOR</h3>
        <textarea id="code"></textarea>

        <div class="mode-buttons">
          <button onclick="checkProject()">Check Project</button>
          <button class="secondary" onclick="addGuidedStep()">Next Guided Step</button>
          <button class="danger" onclick="resetProject()">Reset</button>
        </div>
      </div>

      <div class="panel">
        <h3>LIVE PREVIEW</h3>

        <div class="browser-frame">
          <div class="browser-top">
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="dot"></span>
            <span class="browser-title">project-preview.html</span>
          </div>
          <iframe id="preview"></iframe>
        </div>
      </div>
    </div>

    <div class="result" id="result">Your preview updates automatically as you type.</div>

  </section>

</main>

<div id="completion-overlay">
  <div class="overlay-text">SYSTEM COMPLETE</div>
  <div class="overlay-small" id="overlay-reward"></div>
  <div class="score-box" id="score-box"></div>
</div>

<script>
const projects = [
  {
    id: "profile-card",
    icon: "</>",
    title: "Profile Card",
    difficulty: "EASY",
    difficultyClass: "easy",
    reward: 80,
    badge: "Profile Builder",
    type: "FRONTEND",
    story: "An underground coder needs a digital identity card.",
    description: "Build a profile card using HTML and CSS.",
    previewType: "profile",
    guidedSteps: [
      "<h1>Your Name</h1>",
      "\n<p>Your short bio goes here.</p>",
      "\n<img src=\"profile.png\">",
      "\n<button>Follow Me</button>",
      `\n\n<style>
body {
  font-family: Arial;
  text-align: center;
  background-color: #03080F;
  color: #39FF5A;
}

.card {
  border: 2px solid #39FF5A;
  padding: 20px;
  background-color: #050B12;
}
</style>`
    ],
    starter: "<h1>Your Name</h1>",
    requirements: [
      { label: "Add a heading", check: code => code.includes("<h1>") && code.includes("</h1>") },
      { label: "Add a paragraph bio", check: code => code.includes("<p>") && code.includes("</p>") },
      { label: "Add an image", check: code => code.includes("<img") && code.includes("src=") },
      { label: "Add a button", check: code => code.includes("<button>") && code.includes("</button>") },
      { label: "Add CSS styling", check: code => code.includes("<style>") && code.includes("border") && code.includes("padding") }
    ]
  },

  {
    id: "click-counter",
    icon: "++",
    title: "Click Counter",
    difficulty: "MEDIUM",
    difficultyClass: "medium",
    reward: 120,
    badge: "Click Master",
    type: "INTERACTIVE",
    story: "A power generator needs a working click monitor.",
    description: "Build a button that increases a number.",
    previewType: "counter",
    starter:
`<h1>Click Counter</h1>
<p>Count: <span id="count">0</span></p>
<button onclick="increase()">Click Me</button>

<script>
let number = 0;

function increase() {
  number++;
  document.getElementById("count").innerText = number;
}
<\/script>`,
    guidedSteps: [],
    requirements: [
      { label: "Add a button", check: code => code.includes("<button") },
      { label: "Create a number variable", check: code => code.includes("let") || code.includes("var") || code.includes("const") },
      { label: "Use a function", check: code => code.includes("function") },
      { label: "Increase the number", check: code => code.includes("++") || code.includes("+= 1") || code.includes("= number + 1") },
      { label: "Update page text", check: code => code.includes("innerText") || code.includes("textContent") }
    ]
  },

  {
    id: "mini-quiz",
    icon: "?",
    title: "Mini Quiz",
    difficulty: "HARD",
    difficultyClass: "hard",
    reward: 150,
    badge: "Quiz Creator",
    type: "LOGIC",
    story: "A security checkpoint needs a quiz verification system.",
    description: "Build a quiz that checks an answer.",
    previewType: "quiz",
    starter:
`<h1>Mini Quiz</h1>
<p>What does HTML stand for?</p>

<button onclick="checkAnswer('wrong')">Hyper Trainer Markup Language</button>
<button onclick="checkAnswer('correct')">HyperText Markup Language</button>

<p id="result"></p>

<script>
function checkAnswer(answer) {
  if (answer === "correct") {
    document.getElementById("result").innerText = "Correct!";
  } else {
    document.getElementById("result").innerText = "Try again.";
  }
}
<\/script>`,
    guidedSteps: [],
    requirements: [
      { label: "Add a question", check: code => code.includes("?") || code.includes("<p>") },
      { label: "Add answer buttons", check: code => (code.match(/<button/g) || []).length >= 2 },
      { label: "Use a function", check: code => code.includes("function") },
      { label: "Use an if condition", check: code => code.includes("if") },
      { label: "Show feedback", check: code => code.includes("Correct") || code.includes("Try again") }
    ]
  },

  {
    id: "boss-portfolio",
    icon: "★",
    title: "Boss Portfolio",
    difficulty: "BOSS",
    difficultyClass: "boss",
    reward: 250,
    badge: "Boss Developer",
    type: "BOSS BUILD",
    story: "Build your final developer identity page.",
    description: "Build a mini portfolio with HTML, CSS, and JS.",
    previewType: "portfolio",
    starter:
`<h1>Your Name</h1>
<p>I am learning to code with ByteRush.</p>

<button onclick="showMessage()">Hire Me</button>
<p id="message"></p>

<style>
body {
  font-family: Arial;
  text-align: center;
  background-color: #03080F;
  color: #39FF5A;
}
</style>

<script>
function showMessage() {
  document.getElementById("message").innerText = "Thanks for visiting!";
}
<\/script>`,
    guidedSteps: [],
    requirements: [
      { label: "Add a name heading", check: code => code.includes("<h1>") },
      { label: "Add a bio paragraph", check: code => code.includes("<p>") },
      { label: "Add CSS styling", check: code => code.includes("<style>") && code.includes("background-color") },
      { label: "Add a button", check: code => code.includes("<button") },
      { label: "Add JS interaction", check: code => code.includes("<script>") && code.includes("function") },
      { label: "Update the DOM", check: code => code.includes("getElementById") && (code.includes("innerText") || code.includes("textContent")) }
    ]
  }
];

let activeProject = null;
let guidedIndex = 0;

const projectMenu = document.getElementById("project-menu");
const builder = document.getElementById("builder");
const codeBox = document.getElementById("code");

function renderProjects() {
  projectMenu.innerHTML = "";

  projects.forEach(project => {
    const complete = localStorage.getItem("project-" + project.id + "-complete") === "true";
    const progress = getSavedProgress(project);

    const card = document.createElement("div");
    card.className = "project-card";

    card.innerHTML = `
      <div class="project-top">
        <div>
          <div class="project-title">${project.title}</div>
          <span class="badge-label ${project.difficultyClass}">${project.difficulty}</span>
          <span class="badge-label">${project.type}</span>
        </div>
        <div class="project-icon">${project.icon}</div>
      </div>

      ${getMiniPreview(project.previewType)}

      <p class="project-story">${project.story}</p>

      <div class="status-bar">
        <div class="status-fill" style="width:${progress}%"></div>
      </div>

      <div class="project-footer">
        <span>${complete ? "Completed" : progress > 0 ? "In Progress" : "Available"}</span>
        <span>${project.reward} XP</span>
      </div>
    `;

    card.onclick = function() {
      openProject(project.id);
    };

    projectMenu.appendChild(card);
  });
}

function getMiniPreview(type) {
  if (type === "profile") {
    return `
      <div class="project-preview">
        <div class="fake-avatar"></div>
        <div class="fake-line mid"></div>
        <div class="fake-line short"></div>
        <div class="fake-button"></div>
      </div>
    `;
  }

  if (type === "counter") {
    return `
      <div class="project-preview">
        <div class="fake-counter">07</div>
        <div class="fake-button"></div>
      </div>
    `;
  }

  if (type === "quiz") {
    return `
      <div class="project-preview">
        <div class="fake-line long"></div>
        <div class="fake-quiz-row">
          <div class="fake-answer"></div>
          <div class="fake-answer"></div>
        </div>
      </div>
    `;
  }

  return `
    <div class="project-preview">
      <div class="fake-portfolio">
        <div class="fake-side"></div>
        <div class="fake-main"></div>
      </div>
    </div>
  `;
}

function getSavedProgress(project) {
  const savedCode = (localStorage.getItem("project-" + project.id + "-code") || "").toLowerCase();

  if (!savedCode) return 0;

  const passed = project.requirements.filter(req => req.check(savedCode)).length;
  return Math.round((passed / project.requirements.length) * 100);
}

function openProject(id) {
  activeProject = projects.find(project => project.id === id);
  guidedIndex = parseInt(localStorage.getItem("project-" + id + "-guided-index")) || 0;

  document.getElementById("project-title").innerText = activeProject.title;
  document.getElementById("instruction").innerText = "ByteBot: " + activeProject.story + " Build it step-by-step. Use the checklist. Click Next Guided Step if you need help.";

  const savedCode = localStorage.getItem("project-" + id + "-code");
  codeBox.value = savedCode || activeProject.starter;

  projectMenu.style.display = "none";
  builder.style.display = "block";

  runProject();
  renderChecklist();
}

function addGuidedStep() {
  if (!activeProject) return;

  if (activeProject.guidedSteps.length === 0) {
    document.getElementById("result").innerHTML = "<span class='warning'>ByteBot: This build is challenge-based. Use the checklist and test your skills.</span>";
    return;
  }

  if (guidedIndex >= activeProject.guidedSteps.length) {
    document.getElementById("result").innerHTML = "<span class='success'>ByteBot: All guided steps are already added. Now check the project.</span>";
    return;
  }

  const nextCode = activeProject.guidedSteps[guidedIndex];

  if (!codeBox.value.includes(nextCode.trim())) {
    codeBox.value += nextCode;
  }

  guidedIndex++;
  localStorage.setItem("project-" + activeProject.id + "-guided-index", guidedIndex);

  runProject();

  document.getElementById("result").innerHTML = "<span class='success'>ByteBot: Good. Next build piece added.</span>";
}

function runProject() {
  if (!activeProject) return;

  const code = codeBox.value;
  document.getElementById("preview").srcdoc = code;

  localStorage.setItem("project-" + activeProject.id + "-code", code);
  renderChecklist();
}

function renderChecklist() {
  if (!activeProject) return;

  const code = codeBox.value.toLowerCase();
  const checklist = document.getElementById("checklist");

  checklist.innerHTML = "";

  activeProject.requirements.forEach(req => {
    const done = req.check(code);

    const item = document.createElement("div");
    item.className = "check-item" + (done ? " done" : "");
    item.innerText = (done ? "✓ " : "□ ") + req.label;

    checklist.appendChild(item);
  });
}

function checkProject() {
  if (!activeProject) return;

  runProject();

  const code = codeBox.value.toLowerCase();
  const passed = activeProject.requirements.filter(req => req.check(code)).length;
  const total = activeProject.requirements.length;
  const result = document.getElementById("result");

  if (passed === total) {
    completeProject();
  } else if (passed >= Math.ceil(total / 2)) {
    result.innerHTML = `<span class="warning">ByteBot: Close. ${passed}/${total} systems are working. Finish the remaining checklist items.</span>`;
  } else {
    result.innerHTML = `<span class="error">ByteBot: Build incomplete. ${passed}/${total} systems are working.</span>`;
  }
}

function completeProject() {
  const completedKey = "project-" + activeProject.id + "-complete";
  const alreadyCompleted = localStorage.getItem(completedKey) === "true";
  const result = document.getElementById("result");

  if (!alreadyCompleted) {
    let xp = parseInt(localStorage.getItem("xp")) || 0;
    xp += activeProject.reward;
    localStorage.setItem("xp", xp);

    let badges = JSON.parse(localStorage.getItem("badges")) || [];

    if (!badges.includes(activeProject.badge)) {
      badges.push(activeProject.badge);
      localStorage.setItem("badges", JSON.stringify(badges));
    }

    localStorage.setItem(completedKey, "true");

    showOverlay(activeProject.badge, activeProject.reward);
    result.innerHTML = `<span class="success">ByteBot: Project complete. +${activeProject.reward} XP. Badge unlocked: ${activeProject.badge}</span>`;
  } else {
    result.innerHTML = `<span class="success">ByteBot: Project already completed. Badge: ${activeProject.badge}</span>`;
  }

  renderProjects();
}

function showOverlay(badge, xp) {
  const overlay = document.getElementById("completion-overlay");
  const reward = document.getElementById("overlay-reward");
  const scoreBox = document.getElementById("score-box");

  reward.innerText = "Badge unlocked: " + badge + " | +" + xp + " XP";
  scoreBox.innerHTML = `
    STYLE: ${randomScore()}<br>
    LOGIC: ${randomScore()}<br>
    CLEAN CODE: ${randomScore()}<br>
    RANK: A
  `;

  overlay.style.display = "flex";

  setTimeout(function() {
    overlay.style.display = "none";
  }, 3000);
}

function randomScore() {
  return Math.floor(Math.random() * 16) + 85;
}

function resetProject() {
  if (!activeProject) return;

  if (confirm("Reset this project?")) {
    localStorage.removeItem("project-" + activeProject.id + "-code");
    localStorage.removeItem("project-" + activeProject.id + "-guided-index");
    localStorage.removeItem("project-" + activeProject.id + "-complete");

    guidedIndex = 0;
    codeBox.value = activeProject.starter;

    runProject();
    document.getElementById("result").innerText = "ByteBot: Project reset. Start rebuilding.";
  }
}

function backToProjects() {
  builder.style.display = "none";
  projectMenu.style.display = "grid";
  activeProject = null;
  renderProjects();
}

codeBox.addEventListener("input", runProject);

renderProjects();
</script>

</body>
</html>
