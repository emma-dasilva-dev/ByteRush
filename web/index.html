<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ByteRush — Retro Coding Quest</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient glow -->
    <div class="glow-bg"></div>
    <!-- Floating particles -->
    <div class="particles" id="particles"></div>
    <!-- Main panel -->
    <div class="panel-wrapper">
        <div class="panel">
            <!-- Corner pixel decorations -->
            <div class="pixel-blocks pixel-blocks--tl">
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--muted"></div>
                <div class="pixel pixel--dim"></div>
                <div class="pixel pixel--yellow"></div>
            </div>
            <div class="pixel-blocks pixel-blocks--tr">
                <div class="pixel pixel--accent"></div>
                <div class="pixel pixel--blue"></div>
                <div class="pixel pixel--blue"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--yellow"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--dim"></div>
            </div>
            <div class="pixel-blocks pixel-blocks--bl">
                <div class="pixel pixel--blue"></div>
                <div class="pixel pixel--yellow"></div>
                <div class="pixel pixel--yellow"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--blue"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--dim"></div>
            </div>
            <div class="pixel-blocks pixel-blocks--br">
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--dim"></div>
                <div class="pixel pixel--yellow"></div>
                <div class="pixel pixel--blue"></div>
                <div class="pixel pixel--accent"></div>
                <div class="pixel pixel--accent"></div>
                <div class="pixel pixel--yellow"></div>
            </div>
            <div class="pixel-blocks pixel-blocks--left">
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--dim"></div>
                <div class="pixel pixel--accent"></div>
                <div class="pixel pixel--green"></div>
                <div class="pixel pixel--blue"></div>
            </div>
            <!-- Content -->
            <div class="content">
                <!-- Status bar -->
                <div class="status-bar">
                    <span class="status-bar__left">
                        <span class="status-dot"></span>
                        SYS ONLINE
                    </span>
                    <span class="status-bar__right">V1.0.0</span>
                </div>
                <div class="label-top">START YOUR</div>
                <h1 class="title">BYTERUSH</h1>
                <div class="subtitle">RETRO CODING QUEST</div>
                <p class="description">
                    Build. Style. Script.<br>
                    Complete coding missions and power up your skills.<span class="cursor-blink"></span>
                </p>
                <div class="divider"></div>
                <button class="btn-start" type="button">PRESS START</button>
                <div class="divider"></div>
                <div class="modes">
                    <div class="mode-tag">
                        <span class="tag-icon"></span>HTML ARENA
                    </div>
                    <div class="mode-tag">
                        <span class="tag-icon"></span>CSS CIRCUIT
                    </div>
                    <div class="mode-tag">
                        <span class="tag-icon"></span>JS CORE
                    </div>
                </div>
            </div>
        </div>
    </div>
    <!-- Credits -->
    <div class="credits">
        <p>© 2026 BYTERUSH — ALL SYSTEMS NOMINAL</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
