<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HTML Arena</title>

  <style>
    body {
      background: black;
      color: #39ff5a;
      font-family: monospace;
      text-align: center;
      padding: 40px;
      margin: 0;
    }

    h1, h2, h3 {
      color: #39ff5a;
    }

    .arena-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      width: 90%;
      max-width: 1000px;
      margin: 30px auto;
      align-items: start;
    }

    .code-area,
    .preview-area {
      width: 100%;
      text-align: left;
    }

    textarea,
    iframe {
      width: 100%;
      height: 220px;
      border: 2px solid #39ff5a;
      box-sizing: border-box;
    }

    textarea {
      background: #050b12;
      color: #39ff5a;
      padding: 15px;
      font-family: monospace;
      font-size: 16px;
      resize: none;
    }

    iframe {
      background: white;
    }

    button {
      background: transparent;
      color: #39ff5a;
      border: 2px solid #39ff5a;
      padding: 10px 18px;
      margin: 10px 5px;
      cursor: pointer;
      font-family: monospace;
    }

    button:hover {
      background: #39ff5a;
      color: black;
    }

    #result {
      font-weight: bold;
      margin-top: 20px;
    }

    @media (max-width: 800px) {
      .arena-layout {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

  <h1>HTML ARENA</h1>

  <h2 id="mission-title">Mission 1: Create a Heading</h2>

  <p id="mission-task"></p>

  <div class="arena-layout">

    <div class="code-area">
      <h3>Code Editor</h3>
      <textarea id="code"></textarea>

      <br>

      <button onclick="checkCode()">Run</button>
      <button onclick="resetArena()">Reset HTML Arena</button>
    </div>

    <div class="preview-area">
      <h3>Live Preview</h3>
      <iframe id="preview"></iframe>
    </div>

  </div>

  <p id="result"></p>

  <button onclick="window.location.href='index.html'">
    ← BACK TO DASHBOARD
  </button>

  <script>
    let level = parseInt(localStorage.getItem("html-level")) || 1;

    function loadMission() {
      const title = document.getElementById("mission-title");
      const task = document.getElementById("mission-task");
      const code = document.getElementById("code");
      const result = document.getElementById("result");
      const preview = document.getElementById("preview");

      result.innerText = "";
      preview.srcdoc = "";

      if (level === 1) {
        title.innerText = "Mission 1: Create a Heading";
        task.innerText = "Use h1 tags to create: Hello World.";
        code.value = "<h1></h1>";
      } else if (level === 2) {
        title.innerText = "Mission 2: Create a Paragraph";
        task.innerText = "Use p tags to create: I love coding.";
        code.value = "<p></p>";
      } else {
        title.innerText = "HTML Arena Complete!";
        task.innerText = "You completed the first two HTML missions. Click Reset HTML Arena if you want to practice again.";
        code.value = "";
      }

      updatePreview();
    }

    function updatePreview() {
      const rawCode = document.getElementById("code").value;
      const preview = document.getElementById("preview");
      preview.srcdoc = rawCode;
    }

    function checkCode() {
      const rawCode = document.getElementById("code").value;
      const code = rawCode.replace(/\s+/g, "").toLowerCase();
      const result = document.getElementById("result");

      updatePreview();

      if (level === 1 && code === "<h1>helloworld</h1>") {
        success(10, 2);
      } else if (level === 2 && code === "<p>ilovecoding</p>") {
        success(10, 3);
      } else if (level >= 3) {
        result.innerText = "🏆 Completed. Reset the arena to practice again.";
      } else {
        result.innerText = "❌ Almost. Check your tags and text.";
      }
    }

    function success(xpGain, nextLevel) {
      const result = document.getElementById("result");

      result.innerText = "✅ Correct! +" + xpGain + " XP";

      addXP(xpGain);
      level = nextLevel;
      localStorage.setItem("html-level", level);

      setTimeout(loadMission, 1200);
    }

    function addXP(points) {
      let xp = parseInt(localStorage.getItem("xp")) || 0;
      xp += points;
      localStorage.setItem("xp", xp);
    }

    function resetArena() {
      localStorage.setItem("html-level", 1);
      level = 1;
      loadMission();
      document.getElementById("result").innerText = "🔄 HTML Arena reset. Start again from Mission 1.";
    }

    document.getElementById("code").addEventListener("input", updatePreview);

    loadMission();
  </script>

</body>
</html>
